            transition: all 0.2s ease;
        }

        function handleAnswer(type, qIdx, value) {
            // 정답 데이터 저장
            answers[`${type}-${qIdx}`] = value;
            
            // 해당 질문 카드만 스타일 업데이트 (깜빡임/스크롤 튐 방지)
            const card = document.getElementById(`card-${type}-${qIdx}`);
            if (card) {
                card.classList.remove('border-slate-100');
                card.classList.add('border-indigo-100', 'bg-indigo-50/20');
            }

            // 상단 진행바 및 텍스트 업데이트
            const totalAnswered = Object.keys(answers).length;
            const progress = Math.round((totalAnswered / 180) * 100);
            const progressBar = document.getElementById('progressBar');
            const progressText = document.getElementById('progressText');
            if (progressBar) progressBar.style.width = progress + '%';
            if (progressText) progressText.innerText = progress + '%';

            // 모든 문항 답변 시 하단 다음 버튼 활성화
            const nextBtn = document.getElementById('nextBtn');
            if (nextBtn && isCurrentTypeComplete()) {
                nextBtn.disabled = false;
            }
        }

        function isCurrentTypeComplete() {
            const currentType = types[currentTypeIdx];
            for (let i = 0; i < 20; i++) {
                if (!answers[`${currentType}-${i}`]) return false;
            }
            return true;
        }

        function startTest() { 
            currentStep = 'test'; 
            render(); 
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }
        function prevType() { 
            if (currentTypeIdx > 0) { 
                currentTypeIdx--; 
                render(); 
                window.scrollTo({ top: 0 }); 
            } 
        }
        function nextType() { 
            if (currentTypeIdx < 8) { 
                currentTypeIdx++; 
                render(); 
                window.scrollTo({ top: 0 }); 
            } 
        }
        function showResult() { 
            currentStep = 'result'; 
            render(); 
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }
        function resetTest() { 
            currentStep = 'intro'; 
            currentTypeIdx = 0; 
            answers = {}; 
            render(); 
            window.scrollTo({ top: 0 }); 
        }

        function calculateScores() {
            const scores = {};
            types.forEach(type => {
                let sum = 0;
                for (let i = 0; i < 20; i++) {
                    sum += (answers[`${type}-${i}`] || 0);
                }
                scores[type] = sum;
            });
            return scores;
        }

        // 초기 실행
        render();
    </script>
</body>
</html>
